<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pool Challenge</title>
  <meta name="description" content="Pool Challenge — Truth or Dare for Pool. A card game for real billiard tables.">
  <style>
    :root {
      --felt: #0E2A1F;
      --felt-light: #1A4030;
      --brass: #C9A45C;
      --cream: #FBF6E8;
      --bone: #E8E1D1;
      --dim: #A89E89;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, var(--felt) 0%, var(--felt-light) 100%);
      color: var(--cream);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 560px;
      text-align: center;
    }
    .eyebrow {
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      color: var(--brass);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 48px;
      font-weight: 700;
      margin: 0 0 12px;
      color: var(--cream);
      letter-spacing: -1px;
      font-style: italic;
    }
    .tagline {
      font-size: 18px;
      color: var(--bone);
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: var(--brass);
      text-decoration: none;
      padding: 12px 24px;
      border: 1px solid rgba(201, 164, 92, 0.4);
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.5px;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .links a:hover {
      border-color: var(--brass);
      background: rgba(201, 164, 92, 0.08);
    }
    .contact {
      margin-top: 28px;
      font-size: 14px;
      color: var(--dim);
    }
    .contact a {
      color: var(--bone);
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 225, 209, 0.3);
      transition: border-color 0.2s ease;
    }
    .contact a:hover {
      border-bottom-color: var(--bone);
    }
    .footer {
      margin-top: 60px;
      font-size: 12px;
      color: var(--dim);
      font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">◆ Pool Challenge ◆</div>
    <h1>Truth or Dare<br/>for Pool.</h1>
    <p class="tagline">
      A card game you play at a real billiard table.<br/>
      Draw. Shoot. Score.
    </p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
    </div>
    <p class="contact">
      Questions? Email <a href="mailto:volodymyr.maslikov@gmail.com">volodymyr.maslikov@gmail.com</a>
    </p>
    <div class="footer">© 2026 POOL CHALLENGE</div>
  </div>
</body>
</html>
